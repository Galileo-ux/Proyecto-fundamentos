<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h2>Detector de Noticias Falsas</h2>
        <form id="fake-news-form">
            <label for="news-link" style="display:block; margin-bottom:8px;">Inserta el link de la noticia:</label>
            <input type="url" id="news-link" name="news-link" placeholder="https://ejemplo.com/noticia" required style="width:100%; padding:8px; margin-bottom:12px; border-radius:4px; border:1px solid #aaa;">
            <button type="submit" style="width:100%; padding:10px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer;">Detectar</button>
        </form>
        <div id="result" style="margin-top:20px;"></div>
    </div>
</body>
</html>
