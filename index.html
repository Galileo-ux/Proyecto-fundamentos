<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="text-align:center; margin-bottom:16px;">
            <span style="font-size:2.5rem; color:#007bff;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="12" fill="#e3f2fd"/>
                    <path d="M12 7v5l3 3" stroke="#007bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </div>
        <h2>Detector de Noticias Falsas</h2>
        <form id="fake-news-form">
            <label for="news-link">Inserta el link de la noticia:</label>
            <input type="url" id="news-link" name="news-link" placeholder="https://ejemplo.com/noticia" required>
            <button type="submit">Detectar</button>
        </form>
        <div id="result"></div>
        <div style="margin-top:24px; text-align:center; color:#888; font-size:0.95rem;">
            <em>Minos | Proyecto Fundamentos</em>
        </div>
    </div>
</body>
</html>
